name: Reflow tasks

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - data/tasks.json

permissions:
  contents: write

jobs:
  reflow:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reflow tasks
        run: npm run reflow

      - name: Commit repository update
        run: |
          if git diff --quiet -- data/tasks.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tasks.json
          git commit -m "Reflow tasks"
          git push

